name: CI-CD EC2 React Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: cd terraform && terraform init

    - name: Terraform Apply
      run: cd terraform && terraform apply -auto-approve

    - name: Extract EC2 IP
      id: ip
      run: |
        echo "EC2_PUBLIC_IP=$(cd terraform && terraform output -raw public_ip)" >> $GITHUB_ENV

    - name: Run Ansible Playbook
      uses: dawidd6/action-ansible-playbook@v2
      with:
        playbook: ansible/playbook.yml
        inventory: |
          [web]
          ${{ env.EC2_PUBLIC_IP }} ansible_user=ubuntu ansible_ssh_private_key_file=${{ secrets.SSH_PRIVATE_KEY }}
