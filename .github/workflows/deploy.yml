name: CI/CD - React App to ECS Fargate

on:
  push:
    branches:
      - main

env:
  AWS_REGION: us-east-1
  ECR_REPO_URI: ${{ secrets.ECR_REPO_URI }}

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Source Code
      uses: actions/checkout@v3

    - name: ⚙️ Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v2
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ${{ env.AWS_REGION }}

    - name: 🔐 Login to Amazon ECR
      run: |
        aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $ECR_REPO_URI

    - name: 🛠️ Build and Push Docker Image to ECR
      run: |
        docker build -t react-app .
        docker tag react-app:latest $ECR_REPO_URI:latest
        docker push $ECR_REPO_URI:latest

    - name: 🧱 Set Up Terraform
      uses: hashicorp/setup-terraform@v2
      with:
        terraform_version: 1.6.6

    - name: 🔍 Terraform Init
      run: terraform init

    - name: 🚀 Terraform Apply
      run: terraform apply -auto-approve -var="image_url=${{ env.ECR_REPO_URI }}:latest"
